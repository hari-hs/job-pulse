server {
    listen 80;

    # Reverse proxy to the backend container -- "backend" resolves via
    # Docker Compose's built-in service-name DNS. This replicates exactly
    # what vite.config.js's dev-server proxy does, so the frontend's own
    # code (baseURL: '/api') never needs to know whether it's running
    # under `npm run dev` or this container.
    location /api/ {
        proxy_pass http://backend:8080/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }
}
