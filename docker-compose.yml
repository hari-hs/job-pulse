services:
  postgres:
    image: postgres:16
    container_name: jobpulse-postgres
    environment:
      POSTGRES_DB: jobpulse
      POSTGRES_USER: jobpulse
      POSTGRES_PASSWORD: jobpulse
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U jobpulse -d jobpulse"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
