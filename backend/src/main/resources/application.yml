spring:
  application:
    name: job-pulse-backend
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5433}/${DB_NAME:jobpulse}
    username: ${DB_USER:jobpulse}
    password: ${DB_PASSWORD:jobpulse}
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    open-in-view: false
  mail:
    # Points at Mailhog locally (docker-compose). A prod profile would
    # override these to a real SMTP/SES endpoint -- the EmailSender
    # interface means the reminder scheduler's code never changes either way.
    host: ${MAIL_HOST:localhost}
    port: ${MAIL_PORT:1025}

jobpulse:
  mail:
    from: ${MAIL_FROM:noreply@jobpulse.local}

reminder:
  scheduler:
    fixed-delay-ms: ${REMINDER_SCHEDULER_FIXED_DELAY_MS:300000} # 5 minutes, per DESIGN.md §9

jwt:
  # Dev-only default. Never use this value outside local development —
  # override with a real secret via the JWT_SECRET env var before deploying anywhere.
  secret: ${JWT_SECRET:dev-only-jwt-signing-secret-change-me-before-any-real-deployment}
  expiration-ms: ${JWT_EXPIRATION_MS:86400000} # 24 hours

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always
